<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生职业规划智能助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 8px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            display: flex;
            justify-content: flex-end;
        }

        .message.assistant {
            display: flex;
            justify-content: flex-start;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
            font-size: 13px;
        }

        .message-content table th,
        .message-content table td {
            border: 1px solid #ddd;
            padding: 6px 10px;
            text-align: left;
        }

        .message-content table th {
            background-color: #f2f2f2;
            font-weight: 600;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content strong {
            color: #667eea;
        }

        .example-prompts {
            padding: 12px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .example-prompts p {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .example-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .example-btn {
            padding: 6px 14px;
            background: white;
            border: 1px solid #667eea;
            color: #667eea;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
        }

        .input-container {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #667eea;
        }

        button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .error-message {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
        }

        /* 文件上传区域 */
        .upload-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .upload-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: white;
            border: 2px dashed #667eea;
            color: #667eea;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: #f0f4ff;
        }

        .upload-btn i {
            font-size: 14px;
        }

        .file-input {
            display: none;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #e8f4ff;
            border-radius: 15px;
            font-size: 12px;
            color: #667eea;
        }

        .file-info i {
            color: #dc3545;
        }

        .file-info .remove-file {
            margin-left: 5px;
            cursor: pointer;
            color: #999;
        }

        .file-info .remove-file:hover {
            color: #dc3545;
        }

        .drag-over {
            border-color: #667eea !important;
            background: #f0f4ff !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 大学生职业规划智能助手</h1>
            <p>AI驱动的职业规划 · 岗位分析 · 能力评估 · 职业发展建议</p>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">已连接</span>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">
                    你好！我是你的职业规划助手。我可以帮你：
                    <br><br>
                    ✅ 分析适合你的岗位<br>
                    ✅ 生成岗位画像和要求<br>
                    ✅ 评估你的竞争力<br>
                    ✅ 规划职业发展路径<br>
                    ✅ 生成职业发展报告<br>
                    <br>
                    请告诉我你的专业、技能或求职意向，我来帮你分析！
                </div>
            </div>
        </div>

        <div class="example-prompts">
            <p>💡 试试这些示例：</p>
            <div class="example-buttons">
                <button class="example-btn" onclick="useExample('我是计算机专业的学生，会Java和Python，请帮我分析适合什么岗位')">计算机学生分析</button>
                <button class="example-btn" onclick="useExample('帮我生成前端开发工程师的岗位画像')">前端岗位画像</button>
                <button class="example-btn" onclick="useExample('我想了解Java开发的职业发展路径')">职业路径分析</button>
                <button class="example-btn" onclick="useExample('帮我生成一份职业发展报告')">生成报告</button>
            </div>
        </div>

        <!-- 文件上传区域 -->
        <div class="upload-area" id="uploadArea">
            <label class="upload-btn" for="pdfInput">
                <i class="fas fa-file-pdf"></i>
                <span>上传PDF简历</span>
            </label>
            <input type="file" id="pdfInput" class="file-input" accept=".pdf" onchange="handlePdfUpload(event)">
            <div id="fileInfo" class="file-info" style="display: none;">
                <i class="fas fa-file-pdf"></i>
                <span id="fileName"></span>
                <i class="fas fa-times remove-file" onclick="removeFile()"></i>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="输入你的问题或简历信息..." rows="2" onkeydown="handleKeyDown(event)"></textarea>
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- PDF.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // 设置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // 智能体API地址
        const API_URL = 'https://6f518656-d26a-4db6-92e8-db7875c5b2db.dev.coze.site';
        
        let isProcessing = false;
        let uploadedPdfContent = null;
        let uploadedFileName = null;

        // PDF文件上传处理
        async function handlePdfUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.type !== 'application/pdf') {
                alert('请上传PDF格式的文件');
                return;
            }

            try {
                // 显示文件信息
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileInfo').style.display = 'flex';
                uploadedFileName = file.name;

                // 读取PDF文件
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                let fullText = '';
                
                // 遍历所有页面提取文本
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }

                uploadedPdfContent = fullText.trim();
                
                // 更新提示信息
                const input = document.getElementById('userInput');
                input.placeholder = `已上传简历: ${file.name}，输入你的问题...`;
                
                // 自动发送解析提示
                addMessage(`📄 已上传简历: ${file.name}\n正在解析内容...`, true);
                
            } catch (error) {
                console.error('PDF解析错误:', error);
                alert('PDF文件解析失败，请确保文件格式正确');
                removeFile();
            }
        }

        // 移除已上传的文件
        function removeFile() {
            document.getElementById('pdfInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
            uploadedPdfContent = null;
            uploadedFileName = null;
            document.getElementById('userInput').placeholder = '输入你的问题或简历信息...';
        }

        // 拖拽上传支持
        function setupDragDrop() {
            const uploadArea = document.getElementById('uploadArea');
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('drag-over');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('drag-over');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('drag-over');
                
                const file = e.dataTransfer.files[0];
                if (file && file.type === 'application/pdf') {
                    document.getElementById('pdfInput').files = e.dataTransfer.files;
                    handlePdfUpload({ target: { files: [file] } });
                } else {
                    alert('请上传PDF格式的文件');
                }
            });
        }

        function useExample(text) {
            document.getElementById('userInput').value = text;
            document.getElementById('userInput').focus();
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(content, isUser) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatContent(content);
            
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return contentDiv;
        }

        function formatContent(content) {
            // 简单的Markdown格式化
            let formatted = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            
            // 表格处理
            const lines = formatted.split('<br>');
            let inTable = false;
            let tableHtml = '';
            let result = [];

            lines.forEach((line, index) => {
                if (line.includes('|') && line.trim().startsWith('|')) {
                    if (!inTable) {
                        inTable = true;
                        tableHtml = '<table>';
                    }
                    
                    const cells = line.split('|').filter(c => c.trim());
                    
                    // 跳过分隔行
                    if (cells.every(c => c.trim().match(/^-+$/))) {
                        return;
                    }
                    
                    const isHeader = !result.some(r => r.includes('<table>'));
                    const tag = isHeader ? 'th' : 'td';
                    const row = '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
                    tableHtml += row;
                } else {
                    if (inTable) {
                        tableHtml += '</table>';
                        result.push(tableHtml);
                        tableHtml = '';
                        inTable = false;
                    }
                    result.push(line);
                }
            });

            if (inTable) {
                tableHtml += '</table>';
                result.push(tableHtml);
            }

            return result.join('<br>');
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'message assistant';
            indicatorDiv.id = 'typingIndicator';
            
            indicatorDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            
            chatContainer.appendChild(indicatorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            let userInputText = input.value.trim();
            
            // 如果有上传的PDF内容，需要组合消息
            let finalMessage = '';
            if (uploadedPdfContent) {
                if (userInputText) {
                    // 用户有输入问题，组合简历+问题
                    finalMessage = `【简历内容】\n${uploadedPdfContent}\n\n【用户问题】\n${userInputText}`;
                } else {
                    // 用户没输入问题，默认分析简历
                    finalMessage = `请根据以下简历内容，帮我进行职业规划分析，包括：1.适合的岗位方向 2.能力评估 3.职业发展建议\n\n【简历内容】\n${uploadedPdfContent}`;
                }
            } else {
                finalMessage = userInputText;
            }
            
            if (!finalMessage || isProcessing) return;

            isProcessing = true;
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading-spinner"></span>';

            // 显示用户消息（如果有PDF，显示上传信息+用户问题）
            let displayMessage = '';
            if (uploadedPdfContent) {
                displayMessage = `📄 简历: ${uploadedFileName}`;
                if (userInputText) {
                    displayMessage += `\n${userInputText}`;
                }
            } else {
                displayMessage = finalMessage;
            }
            addMessage(displayMessage, true);
            
            input.value = '';

            showTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/stream_run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        type: 'query',
                        session_id: Date.now().toString(),
                        message: finalMessage,
                        content: {
                            query: {
                                prompt: [{
                                    type: 'text',
                                    content: { text: finalMessage }
                                }]
                            }
                        }
                    })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantContent = '';
                let contentDiv = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                // 处理不同格式的响应
                                if (data.type === 'answer' && data.content && data.content.answer) {
                                    assistantContent += data.content.answer;
                                } else if (data.type === 'tool_response' && data.content && data.content.tool_response) {
                                    // 工具调用结果
                                    const toolResp = data.content.tool_response;
                                    if (toolResp.content) {
                                        assistantContent += toolResp.content;
                                    }
                                } else if (data.content) {
                                    assistantContent += data.content;
                                } else if (data.text) {
                                    assistantContent += data.text;
                                } else if (data.message) {
                                    assistantContent += data.message;
                                }

                                if (!contentDiv) {
                                    contentDiv = addMessage(assistantContent, false);
                                } else {
                                    contentDiv.innerHTML = formatContent(assistantContent);
                                }

                                document.getElementById('chatContainer').scrollTop = 
                                    document.getElementById('chatContainer').scrollHeight;
                            } catch (e) {
                                // 跳过解析错误的行
                            }
                        }
                    }
                }

                if (!contentDiv && !assistantContent) {
                    addMessage('抱歉，没有收到回复。请稍后再试。', false);
                }

            } catch (error) {
                hideTypingIndicator();
                addMessage(`发生错误：${error.message}<br><br>请检查网络连接是否正常。`, false);
                console.error('Error:', error);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }

        // 页面加载完成
        window.onload = () => {
            document.getElementById('userInput').focus();
            setupDragDrop();
        };
    </script>
</body>
</html>
